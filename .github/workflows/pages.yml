name: Deploy to GitHub Pages

on:
  push:
    branches:
      - claude/property-data-skill-mIW9q
      - gh-pages
      - main
    paths:
      - "docs/**"
      - ".github/workflows/pages.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Prepare site artifact
        run: |
          mkdir -p _site
          if [ -d "docs" ]; then
            cp -r docs/* _site/
            [ -f "docs/.nojekyll" ] && cp docs/.nojekyll _site/ || touch _site/.nojekyll
          else
            echo "No docs folder found"
            exit 1
          fi
          ls -la _site/

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: "_site"

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
