name: Docker Security Scan

on:
  push:
    branches: [main, master]
    paths:
      - "chatbot/**"
      - "web/**"
      - "docker-compose.yml"
      - ".github/workflows/docker-security.yml"
  pull_request:
    branches: [main, master]
    paths:
      - "chatbot/**"
      - "web/**"
      - "docker-compose.yml"
      - ".github/workflows/docker-security.yml"

jobs:
  scan:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write

    steps:
      - uses: actions/checkout@v4

      - name: Run Trivy vulnerability scanner (chatbot dependencies)
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: fs
          scan-ref: ./chatbot
          format: sarif
          output: chatbot-trivy.sarif
          severity: CRITICAL,HIGH

      - name: Run Trivy vulnerability scanner (web dependencies)
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: fs
          scan-ref: ./web
          format: sarif
          output: web-trivy.sarif
          severity: CRITICAL,HIGH

      - name: Upload Trivy results to GitHub Security
        uses: github/codeql-action/upload-sarif@v3
        continue-on-error: true
        with:
          sarif_file: chatbot-trivy.sarif
          category: chatbot-scan

      - name: Upload web Trivy results
        uses: github/codeql-action/upload-sarif@v3
        continue-on-error: true
        with:
          sarif_file: web-trivy.sarif
          category: web-scan
