name: Docker Security Scan

on:
  push:
    branches: [main, master]
    paths:
      - "chatbot/**"
      - "web/**"
      - "docker-compose.yml"
      - ".github/workflows/docker-security.yml"
  pull_request:
    branches: [main, master]
    # The scan only builds and inspects chatbot/Dockerfile and web/Dockerfile.
    # Mirror the push trigger but DO NOT re-include this workflow file in the
    # PR paths: that self-reference forces the job to re-run every time the
    # workflow itself is edited, even on PRs that don't touch chatbot/web,
    # producing spurious "Set up job" failures. The push trigger to main still
    # exercises the workflow when it changes upstream.
    paths:
      - "chatbot/**"
      - "web/**"
      - "docker-compose.yml"

jobs:
  scan:
    runs-on: ubuntu-latest
    # Required for github/codeql-action/upload-sarif. Without this the
    # SARIF upload returns 403 on repos that default to read-only tokens.
    permissions:
      contents: read
      security-events: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build chatbot image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./chatbot/Dockerfile
          load: true
          tags: aiox-chatbot:scan

      - name: Build web image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./web/Dockerfile
          load: true
          tags: aiox-web:scan

      # aquasecurity/trivy-action 0.28.0 was within the GHSA-69fq-xp46-6x23
      # supply-chain attack window (CVE-2026-33634, March 19 2026). Pinned
      # to v0.35.0 by full commit SHA so the contents can't drift again.
      - name: Run Trivy vulnerability scanner on chatbot
        uses: aquasecurity/trivy-action@57a97c7e7821a5776cebc9bb87c984fa69cba8f1  # v0.35.0
        with:
          image-ref: aiox-chatbot:scan
          format: sarif
          output: chatbot-trivy.sarif

      - name: Run Trivy vulnerability scanner on web
        uses: aquasecurity/trivy-action@57a97c7e7821a5776cebc9bb87c984fa69cba8f1  # v0.35.0
        with:
          image-ref: aiox-web:scan
          format: sarif
          output: web-trivy.sarif

      - name: Upload Trivy results to GitHub Security
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: chatbot-trivy.sarif
          category: chatbot-scan

      - name: Upload web Trivy results
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: web-trivy.sarif
          category: web-scan
