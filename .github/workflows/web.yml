name: Portal web

on:
  workflow_dispatch:
  push:
    branches: [main, master]
    paths:
      - "web/**"
      - ".github/workflows/web.yml"
      - "docker-compose.yml"
  pull_request:
    paths:
      - "web/**"
      - ".github/workflows/web.yml"
      - "docker-compose.yml"

jobs:
  build-and-smoke:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Instalar dependências
        run: npm ci

      - name: Build (tsc + Vite)
        run: npm run build

      - name: Smoke da API
        run: |
          node dist/server/index.js &
          SRV_PID=$!
          sleep 2
          npm run test:smoke
          EC=$?
          kill $SRV_PID 2>/dev/null || true
          exit $EC
