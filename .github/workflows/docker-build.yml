name: Docker Build & Push

on:
  push:
    branches: [main, master]
    paths:
      - "chatbot/**"
      - "web/**"
      - "squads/**"
      - "docker-compose.yml"
      - ".dockerignore"
      - ".github/workflows/docker-build.yml"
  pull_request:
    branches: [main, master]
    paths:
      - "chatbot/**"
      - "web/**"
      - "squads/**"
      - "docker-compose.yml"

env:
  REGISTRY: ghcr.io

jobs:
  build-chatbot:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ github.repository }}/chatbot
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=sha,prefix=sha-
            type=semver,pattern={{version}}
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push chatbot image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./chatbot/Dockerfile
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  build-web:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ github.repository }}/web
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=sha,prefix=sha-
            type=semver,pattern={{version}}
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push web image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./web/Dockerfile
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  test-images:
    runs-on: ubuntu-latest
    needs: [build-chatbot, build-web]
    if: github.event_name == 'pull_request'

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build chatbot for testing
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./chatbot/Dockerfile
          load: true
          tags: aiox-chatbot:test

      - name: Build web for testing
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./web/Dockerfile
          load: true
          tags: aiox-web:test

      - name: Test chatbot image
        run: |
          docker run --rm -d --name chatbot-test aiox-chatbot:test
          sleep 3
          docker ps | grep chatbot-test || (echo "Container failed to start"; docker logs chatbot-test; exit 1)
          docker stop chatbot-test

      - name: Test web image
        run: |
          docker run --rm -d --name web-test aiox-web:test
          sleep 3
          docker ps | grep web-test || (echo "Container failed to start"; docker logs web-test; exit 1)
          docker stop web-test
