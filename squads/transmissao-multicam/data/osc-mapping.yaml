# Mapeamento OSC — TouchOSC ↔ OBS WebSocket
#
# Single source of truth. Lido por:
#  - operator-panel/src/server/osc-bridge.ts (Next.js bridge)
#  - templates/touchosc/README.md (documentação dos layouts)
#  - auto-switch-engine/src/auto_switch/osc_feedback.py (apenas seção `feedback`)
#
# Formato:
#   commands[]:  TouchOSC → OBS  (operator → switching/audio/show)
#   feedback[]:  OBS/Engine → TouchOSC (status visual no tablet)
#
# Convenções de address: /tx/<domain>/<verb>[/<param>]
# `$1`, `$2` referenciam args OSC posicionais (0-indexed argumentos do tipo OSC),
# ou um parâmetro extraído do address quando entre `<>`.
# `args.scene` aceita o nome literal da cena ou a string `$1` indicando que
# vem do payload OSC.

version: 1
default_port: 9300        # bridge listen (TouchOSC envia para esta porta)
feedback_port: 9301       # bridge envia feedback para o tablet nesta porta

commands:
  # ─── Scene switching ────────────────────────────────────────
  - address: "/tx/scene/cam1"
    action: setProgramScene
    args: { scene: CAM1 }
  - address: "/tx/scene/cam2"
    action: setProgramScene
    args: { scene: CAM2 }
  - address: "/tx/scene/cam3"
    action: setProgramScene
    args: { scene: CAM3 }
  - address: "/tx/scene/cam4"
    action: setProgramScene
    args: { scene: CAM4 }
  - address: "/tx/scene/grid"
    action: setProgramScene
    args: { scene: GRID }
  - address: "/tx/scene/slides_full"
    action: setProgramScene
    args: { scene: SLIDES_FULL }
  - address: "/tx/scene/slides_pip"
    action: setProgramScene
    args: { scene: SLIDES_PIP }
  - address: "/tx/scene/tela_pip"
    action: setProgramScene
    args: { scene: TELA_PIP }
  - address: "/tx/scene/standby"
    action: setProgramScene
    args: { scene: STANDBY }
  - address: "/tx/scene/encerramento"
    action: setProgramScene
    args: { scene: ENCERRAMENTO }

  # ─── PiP control ────────────────────────────────────────────
  - address: "/tx/pip/camera/cam1"
    action: setPipCamera
    args: { scene: CAM1 }
  - address: "/tx/pip/camera/cam2"
    action: setPipCamera
    args: { scene: CAM2 }
  - address: "/tx/pip/camera/cam3"
    action: setPipCamera
    args: { scene: CAM3 }
  - address: "/tx/pip/camera/cam4"
    action: setPipCamera
    args: { scene: CAM4 }

  - address: "/tx/pip/corner/top_left"
    action: setPipLayout
    args: { corner: top_left }
  - address: "/tx/pip/corner/top_right"
    action: setPipLayout
    args: { corner: top_right }
  - address: "/tx/pip/corner/bottom_left"
    action: setPipLayout
    args: { corner: bottom_left }
  - address: "/tx/pip/corner/bottom_right"
    action: setPipLayout
    args: { corner: bottom_right }

  - address: "/tx/pip/size/20"
    action: setPipLayout
    args: { size: 20 }
  - address: "/tx/pip/size/25"
    action: setPipLayout
    args: { size: 25 }
  - address: "/tx/pip/size/30"
    action: setPipLayout
    args: { size: 30 }

  # ─── Audio mixer ────────────────────────────────────────────
  # Address format: /tx/audio/mute/<input_index>  (1-based)
  # Argument: float 0.0 = unmute, >= 0.5 = mute
  # The bridge resolves <input_index> against data/mic-mapping.yaml
  - address: "/tx/audio/mute/1"
    action: setInputMute
    args: { input_index: 1, muted: "$1" }
  - address: "/tx/audio/mute/2"
    action: setInputMute
    args: { input_index: 2, muted: "$1" }
  - address: "/tx/audio/mute/3"
    action: setInputMute
    args: { input_index: 3, muted: "$1" }
  - address: "/tx/audio/mute/4"
    action: setInputMute
    args: { input_index: 4, muted: "$1" }

  # Fader: float 0.0..1.0 normalized; bridge maps to dB range [-60..+6]
  - address: "/tx/audio/fader/1"
    action: setInputVolumeNormalized
    args: { input_index: 1, normalized: "$1" }
  - address: "/tx/audio/fader/2"
    action: setInputVolumeNormalized
    args: { input_index: 2, normalized: "$1" }
  - address: "/tx/audio/fader/3"
    action: setInputVolumeNormalized
    args: { input_index: 3, normalized: "$1" }
  - address: "/tx/audio/fader/4"
    action: setInputVolumeNormalized
    args: { input_index: 4, normalized: "$1" }

  - address: "/tx/audio/mute_all"
    action: muteAllInputs

  # ─── Mode toggle ────────────────────────────────────────────
  - address: "/tx/mode/manual"
    action: broadcastOperatorOverride
    args: { duration_ms: 10000 }
  - address: "/tx/mode/auto"
    action: clearOperatorOverride

  # ─── Show flow ──────────────────────────────────────────────
  - address: "/tx/show/standby"
    action: setProgramScene
    args: { scene: STANDBY }
  - address: "/tx/show/golive"
    action: setProgramScene
    args: { scene: CAM1 }
  - address: "/tx/show/encerramento"
    action: setProgramScene
    args: { scene: ENCERRAMENTO }

# ─── Inbound feedback (bridge/engine → TouchOSC) ──────────────
# Bridge subscribe nestes eventos do obs-websocket e empurra para o tablet.
feedback:
  # Cena ativa: TouchOSC acende o botão correspondente.
  - event: CurrentProgramSceneChanged
    address_template: "/tx/feedback/scene/{scene_name}"
    payload: 1.0
    # Plus: zera todos os outros indicadores no tablet
    reset_others_template: "/tx/feedback/scene/*"
    reset_value: 0.0

  # VU meter: peak dBFS por canal de áudio (mapeado pelo input_index)
  - event: InputVolumeMeters
    address_template: "/tx/feedback/audio/level/{input_index}"
    payload: peak_dbfs
    payload_min: -60.0
    payload_max: 0.0

  # Conexão obs-websocket
  - event: ConnectionOpened
    address: "/tx/feedback/connected"
    payload: 1.0
  - event: ConnectionClosed
    address: "/tx/feedback/connected"
    payload: 0.0

  # ────────────────────────────────────────────────────────────────
  # The three entries below are DOCUMENTATION-ONLY: they describe the
  # OSC addresses that the F6 engine sends DIRECTLY to the tablet via
  # python-osc (auto_switch/osc_feedback.py). They never traverse this
  # Next.js bridge — the bridge subscribes only to obs-websocket events
  # and these are not OBS events. They are listed here so layout
  # designers know the full set of TouchOSC addresses they may receive.
  # ────────────────────────────────────────────────────────────────
  - event: EngineSwitchDecided      # direct from engine, NOT via bridge
    address_template: "/tx/feedback/scene/{scene_name}"
    payload: 1.0
    bridge_handles: false
  - event: EngineModeChanged        # direct from engine, NOT via bridge
    address: "/tx/feedback/mode"
    payload: mode_value             # 1.0 = manual override, 0.0 = auto
    bridge_handles: false
  - event: EngineHealthChanged      # direct from engine, NOT via bridge
    address_template: "/tx/feedback/health/{camera_id}"
    payload: healthy_value          # 1.0 = healthy, 0.0 = dropout
    bridge_handles: false
