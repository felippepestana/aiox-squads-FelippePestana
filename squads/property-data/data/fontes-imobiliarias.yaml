regras_de_uso:
  - "Priorizar fontes de prioridade 1 antes de prioridade 2"
  - "Indicar sempre: fonte, URL/referência, data de consulta"
  - "Nunca citar dados sem verificar autenticidade"
  - "Para dados de mercado, usar mínimo 3 fontes comparáveis"
  - "Imagens de satélite devem ter data de captura registrada"
  - "Legislação municipal varia por cidade — sempre verificar vigência"
  - "Dados do IPTU podem estar desatualizados — cruzar com vistoria visual"
