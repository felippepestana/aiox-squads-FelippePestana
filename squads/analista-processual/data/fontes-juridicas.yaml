regras_de_uso:
  - "Priorizar decisões dos últimos 5 anos"
  - "Indicar sempre: tribunal/fonte, número, data e ementa/resumo"
  - "Prioridade 1 sempre antes de prioridade 2 ou 3"
  - "Nunca citar fontes sem verificar autenticidade"
  - "Controvérsias devem apresentar AMBAS as posições"
  - "Súmulas vinculantes (STF) têm relevância absoluta"
