workflow:
  id: wf-analise-completa
  name: "Análise Processual Completa"
  version: "1.0.0"
  orchestrator: analista-chefe
  description: |
    Pipeline completo para análise de processo judicial com documentos.
    Ativa todos os tiers sequencialmente: Tier 0 (mapeamento/avaliação) →
    Tier 1 (jurídico em paralelo) → Tier Síntese (relatório final MODO_JURIDICO).
  use_case: UC-AP-002
  estimated_duration: "15-40 min"
  language: "pt-BR"

phases:
  PHASE-1:
    name: "Classificação"
    executor: analista-chefe
    action: "Classificar demanda como UC-AP-002, definir plano de ativação"
    quality_gate: QG-AP-001
    on_fail: "Perguntar ao usuário para esclarecer a demanda"

  PHASE-2:
    name: "Tier 1 — Execução Jurídica (paralelo)"
    execution_mode: PARALLEL
    agents:
      - leitor-de-pecas
      - pesquisador-juridico
    tasks:
      - ap-ler-peca
      - ap-pesquisar-jurisprudencia

  PHASE-3:
    name: "Tier 1 — Análise Estratégica (sequencial)"
    execution_mode: SEQUENTIAL
    agents:
      - estrategista-processual
      - advogado-orientador
    tasks:
      - ap-analisar-estrategia
      - ap-planejar-acao
    depends_on: PHASE-2

  PHASE-4:
    name: "Síntese"
    executor: analista-chefe
    action: "Consolidar outputs de todas as fases"
    task: ap-sintetizar-analise
    depends_on: PHASE-3

  PHASE-5:
    name: "Documentação"
    executor: documentador-processual
    action: "Gerar e salvar relatório final MODO_JURIDICO"
    task: ap-gerar-relatorio
    quality_gate: QG-AP-004
    depends_on: PHASE-4
    on_fail: "Reexecutar documentador com nome de arquivo alternativo"

quality_checklist:
  - "[ ] Demanda classificada como UC-AP-002"
  - "[ ] Peças processuais lidas e estruturadas (@leitor-de-pecas)"
  - "[ ] Jurisprudência pesquisada (mínimo 5 fontes) (@pesquisador-juridico)"
  - "[ ] 3 cenários com probabilidades definidos (@estrategista-processual)"
  - "[ ] Plano de ação com prazos elaborado (@advogado-orientador)"
  - "[ ] Relatório MODO_JURIDICO salvo com bloco citacoes (QG-AP-004)"

completion_signal: "<promise>COMPLETE: relatorio salvo em [caminho]</promise>"
