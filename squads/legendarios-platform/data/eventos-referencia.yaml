# Tipos de Eventos
tipos_eventos:
  TOP:
    nome_completo: "Track Outdoor de Potencial"
    publico: "Homens"
    duracao_dias: "3-4"
    formato: "Quinta à noite → Domingo"
    atividades:
      - "Trilha e desafios físicos (montanha/natureza)"
      - "Reflexão espiritual e oração"
      - "Compartilhamento e depoimentos em grupo"
      - "Desafios de liderança e caráter"
    protocolo_celular: "Recolhidos ou desligados na entrada"
    numeracao: "TOPs numerados sequencialmente globalmente (TOP #001, #002, ...)"
    preco_padrao_br:
      minimo: 990
      maximo: 1790
      premium_pantanal_rio: "R$ 81.490-81.590"
      jovens_solteiros: 450
  REM:
    nome_completo: "Retiro de Empoderamento Matrimonial"
    publico: "Casais"
    duracao_dias: 2
    formato: "Intensivo de fim de semana"
    objetivo: "Fortalecer o casamento, restaurar relacionamentos"
    preco_padrao_br:
      casal_minimo: 1500
      casal_maximo: 1990
  LEGADO:
    nome_completo: "LEGADO"
    publico: "Pais e filhos"
    duracao_dias: "2-3"
    objetivo: "Fortalecer vínculo pai-filho, transmitir valores, criar memórias"
    preco_padrao_br:
      dupla_minimo: 1000
      dupla_maximo: 1500
    instagram: "@legadolegendariosbrasil"
  RPM:
    nome_completo: "Reunião de Potencial Masculino"
    publico: "Homens (prioritariamente alumni)"
    frequencia: "Mensal"
    formato: "1º sábado do mês, manhã (7h)"
    local: "Espaço público (praça, parque)"
    objetivo: "Manutenção da comunidade entre eventos"
    custo: "Gratuito"
    exemplo_referencia: "Praça Sesquicentenário, Balneário Camboriú, 1º sábado, 7h"

