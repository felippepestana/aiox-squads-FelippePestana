    - "strategy architecture"
    - "complex squad creation"
  sonnet:
    - "source analysis"
    - "positioning"
    - "squad optimization"
    - "process auditing"
  haiku:
    - "template formatting"
    - "scoring"
    - "validation checks"
    - "metadata generation"

