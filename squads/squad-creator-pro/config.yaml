  multi-agent orchestration, model routing e axioma assessment.
  Requer squad-creator >= 4.0.0. Detectado automaticamente pelo squad-chief via config.yaml.
  Pro mode: 3 agentes especialistas, 3 tasks, 3 workflows, axioma assessment, model routing.
author: AIOX Team
