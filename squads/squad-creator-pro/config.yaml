    role: Knowledge Architect
    specialty: DNA extraction, source classification, mind cloning
  - id: pedro-valerio
    file: agents/pedro-valerio.md
    tier: 1
    role: Process Absolutist
    specialty: Axioma assessment, auditing, modernization scoring
  - id: thiago_finch
    file: agents/thiago_finch.md
    tier: 1
    role: Business Strategy Architect
