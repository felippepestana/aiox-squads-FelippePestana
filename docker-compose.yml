# Perfis: suba só o que precisa (nada arranca sem --profile).
#
#   docker compose --profile web up -d --build
#   docker compose --profile chatbot up -d --build
#   docker compose --profile web --profile chatbot up -d --build
#
# Variáveis: ficheiro .env na mesma pasta (ver .env.example na raiz).

services:
  chatbot:
    profiles: ["chatbot"]
    build:
      context: .
      dockerfile: chatbot/Dockerfile
    image: aiox-chatbot:latest
    ports:
      - "${CHATBOT_PORT:-3000}:3000"
    environment:
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:3000/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  squads-web:
    profiles: ["web"]
    build:
      context: .
      dockerfile: web/Dockerfile
    image: aiox-squads-web:latest
    ports:
      - "${WEB_PORT:-8787}:8787"
    environment:
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      SENTRY_DSN: ${SENTRY_DSN:-}
      WEB_PORTAL_API_KEY: ${WEB_PORTAL_API_KEY:-}
      CORS_ORIGIN: ${CORS_ORIGIN:-}
      TRUST_PROXY: ${TRUST_PROXY:-1}
      RATE_LIMIT_ENABLED: ${RATE_LIMIT_ENABLED:-}
      RATE_LIMIT_MAX: ${RATE_LIMIT_MAX:-}
      RATE_LIMIT_HEAVY_MAX: ${RATE_LIMIT_HEAVY_MAX:-}
      SQUADS_ROOT: /app/squads
      PORT: "8787"
      NODE_ENV: production
    restart: unless-stopped
    healthcheck:
      test:
        [
          "CMD",
          "wget",
          "-qO-",
          "http://127.0.0.1:8787/api/health",
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

  property-data-web:
    profiles: ["property-web"]
    build:
      context: .
      dockerfile: property-data-web/Dockerfile
    image: aiox-property-data-web:latest
    ports:
      - "${PROPERTY_WEB_PORT:-3001}:3000"
    environment:
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      DEEPSEEK_API_KEY: ${DEEPSEEK_API_KEY:-}
      NEXT_PUBLIC_SUPABASE_URL: ${NEXT_PUBLIC_SUPABASE_URL:-}
      NEXT_PUBLIC_SUPABASE_ANON_KEY: ${NEXT_PUBLIC_SUPABASE_ANON_KEY:-}
      SUPABASE_SERVICE_ROLE_KEY: ${SUPABASE_SERVICE_ROLE_KEY:-}
      DATABASE_URL: ${DATABASE_URL:-}
      API_KEY_ENCRYPTION_SECRET: ${API_KEY_ENCRYPTION_SECRET:-}
      SQUADS_ROOT: /app/squads
      NODE_ENV: production
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
